<!DOCTYPE html>

<html>

<head>

<title>Kubernetes App</title>

<style>

body {

font-family: Arial;

text-align:center;

margin-top:100px;

}


button {

padding:10px;

font-size:16px;

}

</style>

</head>


<body>


<h1>Kubernetes Full Stack Application</h1>


<p id="message">
Waiting for backend...
</p>


<button onclick="callBackend()">
Test Backend
</button>



<script>


function callBackend(){


fetch("/api")


.then(response => response.json())


.then(data => {


document.getElementById("message").innerHTML =
data.message;


})


.catch(error => {


document.getElementById("message").innerHTML =
"Backend connection failed";


});


}


</script>


</body>


</html>
